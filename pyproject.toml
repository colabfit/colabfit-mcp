[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "colabfit-mcp"
version = "0.1.0"
description = "MCP tools for ColabFit dataset discovery, model training and deployment"
license = {file = "LICENSE"}
readme = "README.md"
authors = [{name = "ColabFit"}]
requires-python = ">= 3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    # "pymongo>=4.0",
    "requests",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Topic :: Utilities",
    "License :: OSI Approved :: BSD License",
]
keywords = [
    "machine learning",
    "interatomic potentials",
    "MCP",
    "model context protocol",
    "materials science",
]

[project.optional-dependencies]
train = ["mace-torch>=0.3.0"]
full = [
    "mace-torch>=0.3.0",
    "cuequivariance>=0.9.0",
    "cuequivariance-torch>=0.9.0",
    "cuequivariance-ops-torch-cu12>=0.9.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
colabfit-mcp = "colabfit_mcp:main"

[project.urls]
Homepage = "https://github.com/colabfit/colabfit-mcp"
