services:
  init-data-dirs:
    image: alpine:latest
    volumes:
      - ${COLABFIT_DATA_ROOT:-./colabfit_data}:/data
    command: sh -c "mkdir -p /data/models /data/datasets && chown -R ${USER_ID:-1000}:${GROUP_ID:-1000} /data && chmod -R 755 /data && echo 'Data directories ready'"
    restart: "no"

  colabfit-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    stdin_open: true
    depends_on:
      init-data-dirs:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: "27017"
    volumes:
      - ${COLABFIT_DATA_ROOT:-./colabfit_data}/models:/home/mcpuser/colabfit/models
      - ${COLABFIT_DATA_ROOT:-./colabfit_data}/datasets:/home/mcpuser/colabfit/datasets
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  mongodb:
    image: mongo:8.0
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodata:
