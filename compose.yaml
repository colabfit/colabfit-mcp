services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    stdin_open: true
    env_file:
      - path: .env
        required: false
    volumes:
      - ${COLABFIT_DATA_ROOT:-./colabfit_data}/models:/home/mcpuser/colabfit/models
      - ${COLABFIT_DATA_ROOT:-./colabfit_data}/datasets:/home/mcpuser/colabfit/datasets
      - ${COLABFIT_DATA_ROOT:-./colabfit_data}/inference_output:/home/mcpuser/colabfit/inference_output
    shm_size: "2gb"

